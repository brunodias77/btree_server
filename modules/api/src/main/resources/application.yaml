server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: never
    include-binding-errors: never

cors:
  allowed-origins:
    - "http://localhost:3000"
    - "http://localhost:4200"
  max-age: 3600

app:
  frontend-url: "http://localhost:4200"

spring:
  application:
    name: btree

  datasource:
    url: jdbc:postgresql://localhost:5439/btree_server
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: btree-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

storage:
  upload-dir: uploads
  base-url: http://localhost:8080/api

security:
  jwt:
    secret: dev-jwt-secret-that-is-long-enough-for-hs256-algorithm-minimum-256-bits
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000
  encryption:
    secret: dev-encryption-secret-32-chars!!
    salt: deadbeefcafebabe
  google:
    client-id: ${GOOGLE_CLIENT_ID:43372376564-24mgtin7bva93gel4pjaig1jsa3hddnj.apps.googleusercontent.com}

logging:
  level:
    root: INFO
    com.btree: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true